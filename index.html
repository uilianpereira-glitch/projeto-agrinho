<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fazenda do Futuro - Agrinho 2026</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
<h1>🌱 Fazenda do Futuro</h1>
<p>Agro forte, futuro sustentável</p>
</header>

<main>
<section class="hero">
<h2>Gerencie sua fazenda de forma sustentável</h2>
<p>Tome decisões e mantenha o equilíbrio entre lucro e meio ambiente.</p>
</section>

<section class="painel">
<div class="card"><h3>💰 Lucro</h3><span id="lucro">50</span></div>
<div class="card"><h3>🌳 Sustentabilidade</h3><span id="sust">50</span></div>
<div class="card"><h3>💧 Água</h3><span id="agua">50</span></div>
</section>

<section class="acoes">
<h2>Escolha uma ação</h2>
<button onclick="acao(15,-10,-5)">Expandir plantação</button>
<button onclick="acao(10,15,5)">Irrigação inteligente</button>
<button onclick="acao(5,20,10)">Preservar mata ciliar</button>
<button onclick="acao(12,10,0)">Energia solar</button>
</section>

<section class="resultado">
<button onclick="finalizar()">Resultado Final</button>
<h2 id="mensagem"></h2>
</section>
</main>

<footer>Projeto Agrinho 2026 • HTML, CSS e JavaScript</footer>
<script src="script.js"></script>
</body>
</html>
